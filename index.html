<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor AI - Scholar Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f4f7f5;
            --emerald-deep: #064e3b;
            --gold-accent: #d97706;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, var(--emerald-deep), #0f766e);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid var(--gold-accent);
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--emerald-deep);
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--emerald-deep);
            color: white;
            border: 1px solid var(--gold-accent);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background-color: #0f766e;
        }
        .output-box {
            background: white;
            border-left: 4px solid var(--gold-accent);
            padding: 15px;
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>Noor AI Scholar Workspace</h1>
        <p>Production Interface connected to Local ML Retrieval Chain</p>
    </header>

    <div class="container">
        <div class="glass-card">
            <h3>🔑 System Credentials & Data Source</h3>
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Local Path to Reference PDF Book</label>
                <input type="text" id="pdfPath" placeholder="e.g., C:/Documents/bahar-e-shariat.pdf">
            </div>
            <button onclick="initializeSystem()">Initialize & Index Knowledge Base</button>
            <div id="initStatus" style="margin-top:10px; font-weight:bold;"></div>
        </div>

        <div class="glass-card">
            <h3>💬 Contextual Inquiry</h3>
            <div class="form-group">
                <label>Ask your question:</label>
                <input type="text" id="userQuery" placeholder="What are the rules of Wudu listed in the text?">
            </div>
            <button onclick="submitQuery()">Query Local Model</button>
            
            <div id="responseContainer" style="display:none;">
                <h4>📖 Response Output</h4>
                <div class="output-box" id="responseText"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api";

        async def initializeSystem() {
            const apiKey = document.getElementById('apiKey').value;
            const pdfPath = document.getElementById('pdfPath').value;
            const statusDiv = document.getElementById('initStatus');
            
            statusDiv.style.color = "orange";
            statusDiv.innerText = "Processing text files and computing vector embeddings... please wait.";

            try {
                const response = await fetch(`${API_URL}/initialize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, query: "", pdf_path: pdfPath })
                });
                const data = await response.json();
                if(response.ok) {
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "System ready! Index successfully mapped.";
                } else {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Initialization failed: " + data.detail;
                }
            } catch(e) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "Could not connect to backend server.";
            }
        }

        async def submitQuery() {
            const apiKey = document.getElementById('apiKey').value;
            const pdfPath = document.getElementById('pdfPath').value;
            const query = document.getElementById('userQuery').value;
            const outText = document.getElementById('responseText');
            const container = document.getElementById('responseContainer');

            outText.innerText = "Searching database and calculating response context...";
            container.style.display = "block";

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, query: query, pdf_path: pdfPath })
                });
                const data = await response.json();
                if(response.ok) {
                    outText.innerText = data.answer;
                } else {
                    outText.innerText = "Error: " + data.detail;
                }
            } catch(e) {
                outText.innerText = "Failed to fetch response from machine learning runtime server.";
            }
        }
    </script>
</body>
</html>
